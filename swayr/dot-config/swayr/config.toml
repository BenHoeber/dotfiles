[menu]
executable = 'fuzzel'
args = [
    '--dmenu',
    '--prompt=🪟❯ ',
    '--config=/home/bhoeber/.config/fuzzel/fuzzel.ini'
    # '--line-height=17',
]

[format]
window_format = "{app_name:{:<11.11}}-  {title:{:<100.100} 󰇘 } {workspace_name:{:>2.2}}\u0000icon\u001f{app_icon}"
indent = ' '

